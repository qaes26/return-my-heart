
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عودة الروح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0a1128; /* لون خلفية ليلية صلب ومريح للجهاز */
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
            color: white;
            position: relative;
        }

        .title-font {
            font-family: 'Amiri', serif;
        }

        /* قمر بسيط وخفيف */
        .moon-light {
            position: absolute;
            top: 5vh;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: #fdfdfd;
            border-radius: 50%;
            box-shadow: 0 0 30px 5px rgba(255, 255, 255, 0.4); /* ظل واحد خفيف */
            z-index: 1;
        }

        /* صندوق المحتوى - بدون فلاتر ثقيلة */
        .simple-panel {
            background: rgba(15, 25, 50, 0.8); /* لون شفاف بسيط بدل الفلتر */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            z-index: 10;
            position: relative;
        }

        .time-block {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }

        /* أنيميشن دخول بسيط فقط عند التحميل */
        .fade-in-simple {
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* نجوم خفيفة جداً عن طريق CSS خالص */
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 160px 120px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 250px 90px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 300px 150px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 350px 200px;
            z-index: 0;
            opacity: 0.6;
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen">

    <!-- خلفية النجوم الخفيفة -->
    <div class="stars-bg"></div>

    <!-- القمر -->
    <div class="moon-light"></div>

    <!-- المحتوى الرئيسي -->
    <main class="relative z-10 w-full max-w-2xl px-4 mt-48 mb-16 fade-in-simple">
        
        <div class="simple-panel p-8 md:p-12 text-center shadow-2xl">
            
            <h1 class="title-font text-5xl font-bold mb-4 text-blue-100">
                عودة الروح
            </h1>
            
            <p class="text-xl text-blue-300 mb-6 title-font">
                إلى شادية.. من تاريخ 21/7/2026
            </p>

            <div class="w-16 h-1 bg-blue-500 mx-auto mb-8 rounded-full opacity-50"></div>

            <p class="text-lg text-gray-300 leading-relaxed mb-8">
                في ضوء هذا القمر، وتحت هذه السماء المرصعة بالنجوم، نعدّ الثواني والدقائق التي تمر.<br>
                كل ثانية هي نبضة حب، وكل يوم هو قصة جديدة نعيشها معاً.
            </p>

            <!-- قسم المؤقت -->
            <div dir="ltr" class="grid grid-cols-4 gap-2 md:gap-4 mb-10">
                <div class="time-block">
                    <div id="days" class="text-2xl md:text-4xl font-bold text-white">00</div>
                    <div class="text-xs md:text-sm text-blue-300 mt-1">يوم</div>
                </div>
                <div class="time-block">
                    <div id="hours" class="text-2xl md:text-4xl font-bold text-white">00</div>
                    <div class="text-xs md:text-sm text-blue-300 mt-1">ساعة</div>
                </div>
                <div class="time-block">
                    <div id="minutes" class="text-2xl md:text-4xl font-bold text-white">00</div>
                    <div class="text-xs md:text-sm text-blue-300 mt-1">دقيقة</div>
                </div>
                <div class="time-block">
                    <div id="seconds" class="text-2xl md:text-4xl font-bold text-rose-400">00</div>
                    <div class="text-xs md:text-sm text-rose-300 mt-1">ثانية</div>
                </div>
            </div>

            <!-- زر تشغيل الموسيقى -->
            <div class="flex flex-col items-center gap-3 mb-6">
                <button id="musicBtn" onclick="toggleMusic()" class="bg-blue-600/30 hover:bg-blue-600/50 text-white rounded-full w-14 h-14 flex items-center justify-center transition-colors border border-blue-400/30">
                    <i class="fa-solid fa-play text-xl" id="musicIcon"></i>
                </button>
                <span class="text-sm text-gray-400">موسيقى ليلية</span>
            </div>

            <!-- التوقيع -->
            <div class="pt-6 border-t border-gray-700 mt-6">
                <p class="text-sm text-gray-400">
                    من إعداد <span class="text-blue-400 font-bold">قيس جازي</span>
                </p>
            </div>
        </div>
    </main>

    <!-- ملف الصوت -->
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/11/22/audio_febc508520.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- الكود البرمجي للمؤقت ---
        const startDate = new Date('2026-07-21T00:00:00').getTime();
        
        // عناصر HTML
        const elDays = document.getElementById('days');
        const elHours = document.getElementById('hours');
        const elMinutes = document.getElementById('minutes');
        const elSeconds = document.getElementById('seconds');

        function updateTimer() {
            const now = new Date().getTime();
            const difference = now - startDate;

            if (difference < 0) {
                elDays.innerText = "00"; elHours.innerText = "00";
                elMinutes.innerText = "00"; elSeconds.innerText = "00";
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            elDays.innerText = days.toString().padStart(2, '0');
            elHours.innerText = hours.toString().padStart(2, '0');
            elMinutes.innerText = minutes.toString().padStart(2, '0');
            elSeconds.innerText = seconds.toString().padStart(2, '0');
        }

        // تحديث كل ثانية
        setInterval(updateTimer, 1000);
        updateTimer();

        // --- التحكم بالموسيقى ---
        const bgMusic = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('musicIcon');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                bgMusic.pause();
                musicIcon.className = "fa-solid fa-play text-xl";
            } else {
                bgMusic.play();
                musicIcon.className = "fa-solid fa-pause text-xl";
            }
            isPlaying = !isPlaying;
        }
    </script>
</body>
</html>

```
